openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: USDTLuck API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User operations
  - name: pools
    description: Pool operations
  - name: transactions
    description: Transaction operations
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/otp-status:
    get:
      operationId: getOtpStatus
      tags: [auth]
      summary: Email verification OTP status (expires, resend cooldown, blocks)
      responses:
        "200":
          description: OTP status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpStatusResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/send-otp:
    post:
      operationId: sendOtp
      tags: [auth]
      summary: Send or refresh email verification code
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOtpBody"
      responses:
        "200":
          description: Code sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpSentResponse"
        "400":
          description: Validation or already verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/resend-otp:
    post:
      operationId: resendOtp
      tags: [auth]
      summary: Resend email verification code (invalidates previous)
      responses:
        "200":
          description: Code sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpSentResponse"
        "400":
          description: Already verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-otp:
    post:
      operationId: verifyOtp
      tags: [auth]
      summary: Verify email with 6-digit code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpBody"
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyOtpResponse"
        "400":
          description: Wrong code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "410":
          description: Code expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/wallet/transactions:
    get:
      operationId: listCurrentUserWalletLedger
      tags: [users]
      summary: Current user wallet ledger rows (prizes, withdrawals, deposits, bonuses)
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Wrapped list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWalletTransactionsResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{userId}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}/transactions:
    get:
      operationId: getUserTransactions
      tags: [users]
      summary: Get user transaction history
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transaction list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /pools:
    get:
      operationId: listPools
      tags: [pools]
      summary: List all pools
      responses:
        "200":
          description: Pool list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pool"
    post:
      operationId: createPool
      tags: [pools]
      summary: Create a new pool (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePoolBody"
      responses:
        "201":
          description: Pool created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pool"

  /pools/{poolId}:
    get:
      operationId: getPool
      tags: [pools]
      summary: Get pool details
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pool details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoolDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updatePool
      tags: [pools]
      summary: Update pool (admin)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePoolBody"
      responses:
        "200":
          description: Updated pool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pool"

  /pools/{poolId}/join:
    post:
      operationId: joinPool
      tags: [pools]
      summary: Join a pool
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Joined pool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Cannot join (full, insufficient balance, already joined, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/distribute:
    post:
      operationId: distributeRewards
      tags: [pools]
      summary: Distribute rewards for a pool (admin)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DistributeRewardsBody"
      responses:
        "200":
          description: Rewards distributed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DistributeResult"
        "400":
          description: Pool not eligible for distribution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/participants:
    get:
      operationId: getPoolParticipants
      tags: [pools]
      summary: Get pool participants
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Participants list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Participant"

  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List all transactions (admin)
      responses:
        "200":
          description: Transaction list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
    post:
      operationId: createTransaction
      tags: [transactions]
      summary: Create a deposit or withdrawal transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionBody"
      responses:
        "201":
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400":
          description: Insufficient balance or invalid amount
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /winners:
    get:
      operationId: listWinners
      tags: [pools]
      summary: Get recent winners feed
      responses:
        "200":
          description: Recent winners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Winner"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [admin]
      summary: Get dashboard stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all users (admin)
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/finance/overview:
    get:
      operationId: getAdminFinanceOverview
      tags: [admin]
      summary: Admin finance overview (treasury, draws, signups)
      responses:
        "200":
          description: Overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminFinanceOverview"

  /admin/wallet/balance:
    get:
      operationId: getAdminCentralWalletBalance
      tags: [admin]
      summary: Central wallet balance and cumulative ledger totals
      responses:
        "200":
          description: Balance snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCentralWalletBalance"

  /admin/wallet/summary:
    get:
      operationId: getAdminCentralWalletSummary
      tags: [admin]
      summary: Central wallet plus today / week / month deposit and payout totals
      responses:
        "200":
          description: Extended summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCentralWalletSummary"

  /admin/finance/wallet-transactions:
    get:
      operationId: listAdminWalletTransactions
      tags: [admin]
      summary: Admin treasury ledger (append-only)
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum: [all, deposit, withdrawal, platform_fee, bonus]
        - in: query
          name: from
          schema:
            type: string
        - in: query
          name: to
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Ledger rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminWalletLedgerRow"

  /admin/finance/draws/{poolId}:
    get:
      operationId: getAdminDrawFinancials
      tags: [admin]
      summary: Saved financial summary for a completed draw
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Draw financials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDrawFinancialsDetail"
        "404":
          description: Not found

  /admin/finance/settings:
    get:
      operationId: getAdminFinanceSettings
      tags: [admin]
      summary: Platform finance settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminFinanceSettings"
    patch:
      operationId: patchAdminFinanceSettings
      tags: [admin]
      summary: Update platform finance settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchAdminFinanceSettings"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminFinanceSettings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    UserWalletLedgerRow:
      type: object
      properties:
        id:
          type: integer
        transaction_type:
          type: string
        category:
          type: string
        amount:
          type: number
        reference_type:
          type: string
          nullable: true
        reference_id:
          type: integer
          nullable: true
        description:
          type: string
        balance_after:
          type: number
        created_at:
          type: string
          format: date-time
      required:
        - id
        - transaction_type
        - category
        - amount
        - description
        - balance_after
        - created_at

    UserWalletTransactionsResponse:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/UserWalletLedgerRow"
      required: [transactions]

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        walletBalance:
          type: number
        bonusBalance:
          type: number
        withdrawableBalance:
          type: number
          description: Deposits, prizes, referral invite, streaks, prediction bonus — can withdraw and buy tickets
        isAdmin:
          type: boolean
        joinedAt:
          type: string
          format: date-time
        emailVerified:
          type: boolean
          description: When false, user must verify email before tickets, deposits, withdrawals
      required: [id, name, email, walletBalance, isAdmin, joinedAt]

    AdminUser:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        walletBalance:
          type: number
        bonusBalance:
          type: number
        withdrawableBalance:
          type: number
        totalSuccessfulReferrals:
          type: integer
        referralMilestonesClaimed:
          type: object
          additionalProperties: true
        isAdmin:
          type: boolean
        joinedAt:
          type: string
          format: date-time
        totalDeposited:
          type: number
        totalWithdrawn:
          type: number
        poolsJoined:
          type: integer
        phone:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        tier:
          type: string
        isBlocked:
          type: boolean
        blockedAt:
          type: string
          format: date-time
          nullable: true
        blockedReason:
          type: string
          nullable: true
        cryptoAddress:
          type: string
          nullable: true
          description: USDT wallet on file
        tierPoints:
          type: integer
        referralCode:
          type: string
          nullable: true
        referredBy:
          type: integer
          nullable: true
        wins:
          type: integer
        emailVerified:
          type: boolean
      required: [id, name, email, walletBalance, isAdmin, joinedAt, totalDeposited, totalWithdrawn, poolsJoined]

    OtpStatusResponse:
      type: object
      properties:
        emailVerified:
          type: boolean
        hasPendingOtp:
          type: boolean
        expiresAt:
          type: string
          format: date-time
          nullable: true
        resendAvailableAt:
          type: string
          format: date-time
          nullable: true
        verifyBlockedUntil:
          type: string
          format: date-time
          nullable: true
      required: [emailVerified, hasPendingOtp]

    SendOtpBody:
      type: object
      properties:
        userId:
          type: integer
          description: Must match authenticated user if provided

    OtpSentResponse:
      type: object
      properties:
        message:
          type: string
        expiresAt:
          type: string
          format: date-time
      required: [message, expiresAt]

    VerifyOtpBody:
      type: object
      properties:
        otp_code:
          type: string
      required: [otp_code]

    VerifyOtpResponse:
      type: object
      properties:
        message:
          type: string
        emailVerified:
          type: boolean
      required: [message, emailVerified]

    SignupBody:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
      required: [name, email, password]

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    UpdateUserBody:
      type: object
      properties:
        name:
          type: string

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required: [user, message]

    Pool:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        entryFee:
          type: number
        maxUsers:
          type: integer
        participantCount:
          type: integer
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        status:
          type: string
          enum: [open, closed, completed]
        prizeFirst:
          type: number
        prizeSecond:
          type: number
        prizeThird:
          type: number
        createdAt:
          type: string
          format: date-time
        minPoolVipTier:
          type: string
          enum: [bronze, silver, gold, diamond]
          description: Minimum activity tier required to join (default bronze)
        minParticipantsToRunDraw:
          type: integer
          description: Minimum participants from prizes + target profit / list entry fee
        drawReady:
          type: boolean
          description: True when participant count meets minParticipantsToRunDraw
        loserRefundIfNotWinListUsdt:
          type: number
          description: List entry minus per-join platform fee; approximate refund if not winning (list-price story)
        platformFeePerJoinOverride:
          type: number
          nullable: true
          description: Admin-set fee per join for this pool; null means default formula applies
        winnerCount:
          type: integer
          enum: [1, 2, 3]
          description: Number of paid winner places for this draw (1st through Nth prizes only)
      required:
        - id
        - title
        - entryFee
        - maxUsers
        - participantCount
        - startTime
        - endTime
        - status
        - prizeFirst
        - prizeSecond
        - prizeThird
        - winnerCount
        - createdAt
        - loserRefundIfNotWinListUsdt

    AdminFinanceOverview:
      type: object
      properties:
        currentBalance:
          type: number
        totalRevenueDeposits:
          type: number
        totalPaidOutWithdrawals:
          type: number
        totalPlatformFees:
          type: number
        todayDeposits:
          type: number
        todayWithdrawals:
          type: number
        perDraw:
          type: array
          items:
            $ref: "#/components/schemas/AdminFinancePerDrawRow"
        activeUsersByDay:
          type: array
          items:
            $ref: "#/components/schemas/ActiveUsersByDayRow"
      required:
        - currentBalance
        - totalRevenueDeposits
        - totalPaidOutWithdrawals
        - totalPlatformFees
        - todayDeposits
        - todayWithdrawals
        - perDraw
        - activeUsersByDay

    AdminFinancePerDrawRow:
      type: object
      properties:
        poolId:
          type: integer
        poolTitle:
          type: string
        ticketsSold:
          type: integer
        totalRevenue:
          type: number
        totalPrizes:
          type: number
        platformFee:
          type: number
        createdAt:
          type: string
          format: date-time
      required: [poolId, poolTitle, ticketsSold, totalRevenue, totalPrizes, platformFee, createdAt]

    ActiveUsersByDayRow:
      type: object
      properties:
        day:
          type: string
        count:
          type: integer
      required: [day, count]

    AdminCentralWalletBalance:
      type: object
      properties:
        balance:
          type: number
          description: Running balance from central_wallet_ledger (last row)
        total_deposits:
          type: number
          description: Sum of TICKET_DEPOSIT credits
        total_payouts:
          type: number
          description: Sum of PRIZE_PAYOUT debits
        total_fees:
          type: number
          description: Net platform fees from draws (CREDIT minus DEBIT rows)
      required: [balance, total_deposits, total_payouts, total_fees]

    AdminCentralWalletSummary:
      type: object
      properties:
        balance:
          type: number
        total_deposits:
          type: number
        total_payouts:
          type: number
        total_fees:
          type: number
        today_deposits:
          type: number
        today_withdrawals:
          type: number
        week_deposits:
          type: number
        week_payouts:
          type: number
        month_deposits:
          type: number
        month_payouts:
          type: number
      required:
        - balance
        - total_deposits
        - total_payouts
        - total_fees
        - today_deposits
        - today_withdrawals
